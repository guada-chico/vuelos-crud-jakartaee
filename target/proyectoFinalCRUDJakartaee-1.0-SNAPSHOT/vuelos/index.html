<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto final CRUD Vuelos</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #e1f5fe;
            color: #333;
            margin: 40px; 
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
        }

        th { 
            background-color: #ffffff;
            color: #2c3e50;
            padding: 15px;
            border-bottom: 3px solid #3498db;
            text-align: center;
        }

        td { 
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        
        td:nth-child(3) {
            font-weight: bold;
            color: #3498db;
        }

        tr:nth-child(even) {
            background-color: #fdfdfd;
        }

        tr:hover {
            background-color: #f1f7ff;
        }
    </style>
</head>
<body>

    <h1>Gestión de Vuelos</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Vuelo</th>
                    <th>Matrícula</th>
                    <th>Fabricante</th>
                    <th>Modelo</th>
                    <th>Compañía</th>
                    <th>Origen</th>
                    <th>Destino</th>
                    <th>Terminal</th>
                    <th>Puerta</th>
                </tr>
            </thead>
            <tbody id="tabla-vuelos">
            </tbody>
        </table>
    </div>
    <script src="app.js?v=1.1"></script>
</body>
</html>
